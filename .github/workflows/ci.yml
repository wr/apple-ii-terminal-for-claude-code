name: CI

# The one shippable artifact is CLAUDE.dsk. The release gate at the bottom
# asserts the built disk carries BOTH clients (COBJ + COBJ8) - the check that
# would have caught the v0.2.0 disk shipping with no 8-bit client. See W-530.
on:
  push:
  pull_request:

jobs:
  python-tests:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python: ["3.10", "3.14"]
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
      - name: Set up Python
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5.6.0
        with:
          python-version: ${{ matrix.python }}
      - name: Install test and bridge dependencies
        run: |
          python3 -m pip install --upgrade pip
          python3 -m pip install -r requirements-test.txt -r bridge/requirements.txt
          python3 -m pip check
      - name: Bridge and renderer tests
        run: python3 -m pytest -q bridge tests

  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      - name: Set up Python
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5.6.0
        with:
          python-version: "3.11"

      - name: Install apt packages (cc65, shellcheck)
        run: |
          sudo apt-get update
          sudo apt-get install -y cc65 shellcheck

      - name: Install build dependencies
        run: |
          python3 -m pip install --upgrade pip
          python3 -m pip install -r requirements-build.txt
          python3 -m pip check

      - name: Cache pinned dos33fsprogs
        id: cache-dos33
        uses: actions/cache@0400d5f644dc74513175e3cd8d07132dd4860809 # v4.2.4
        with:
          path: ~/dos33fsprogs
          key: dos33fsprogs-78fc3bd4b24a6b792f49f311e85412e0cccc272c

      - name: Build pinned dos33fsprogs
        if: steps.cache-dos33.outputs.cache-hit != 'true'
        run: tools/bootstrap-dos33fsprogs.sh

      - name: Verify pinned disk tools
        run: |
          test "$(git -C "$HOME/dos33fsprogs" rev-parse HEAD)" = 78fc3bd4b24a6b792f49f311e85412e0cccc272c
          test -x "$HOME/dos33fsprogs/utils/dos33fs-utils/dos33"
          test -x "$HOME/dos33fsprogs/utils/asoft_basic-utils/tokenize_asoft"

      # --- Checks -----------------------------------------------------------

      - name: Shellcheck
        run: |
          shellcheck apple2gs/build.sh tools/install-sd.sh tools/check-release-disk.sh
          shellcheck tools/bootstrap-dos33fsprogs.sh tests/test_release_gate.sh

      # Fast-fail assembly of both clients (mirrors build.sh flags). claude.s
      # includes the generated assets.inc, so gen_assets.py must run first.
      - name: Assemble both clients
        run: |
          (cd apple2gs && python3 gen_assets.py && ca65 --cpu 65816 -o claude.o claude.s)
          ca65 --cpu 6502 -o apple2/claude2.o apple2/claude2.s

      # --- Release gate -----------------------------------------------------

      - name: Full build (CLAUDE.dsk)
        run: |
          export DOS33FSPROGS="$HOME/dos33fsprogs"
          ./apple2gs/build.sh

      - name: Assert CLAUDE.dsk contains both clients (COBJ + COBJ8)
        run: |
          DOS33="$HOME/dos33fsprogs/utils/dos33fs-utils/dos33" \
            ./tools/check-release-disk.sh apple2gs/CLAUDE.dsk
          DOS33="$HOME/dos33fsprogs/utils/dos33fs-utils/dos33" \
            ./tests/test_release_gate.sh apple2gs/CLAUDE.dsk
          sha256sum apple2gs/CLAUDE.dsk
